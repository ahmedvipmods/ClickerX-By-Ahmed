<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClickerX By AHMED</title>
    <style>
        body { text-align: center; font-family: 'Segoe UI', sans-serif; background: #0b0b0b; color: white; margin: 0; padding: 10px; overflow: hidden; }
        h1 { color: #FFD700; text-shadow: 0 0 10px rgba(255,215,0,0.5); margin: 10px; }
        
        /* واجهة الإعدادات */
        #settings-screen { background: #1a1a1a; padding: 20px; border-radius: 15px; max-width: 400px; margin: 20px auto; border: 2px solid #FFD700; }
        .input-group { margin: 15px 0; text-align: right; }
        input, select { width: 100%; padding: 8px; margin-top: 5px; border-radius: 5px; border: none; }
        button { background: #FFD700; color: black; border: none; padding: 10px 20px; font-weight: bold; cursor: pointer; border-radius: 5px; width: 100%; font-size: 18px; }

        /* منطقة اللعبة */
        #game-area { display: none; }
        .stats-bar { display: flex; justify-content: space-around; font-size: 18px; margin-bottom: 10px; color: #00FF00; }
        #game-container { width: 95vw; height: 50vh; max-width: 500px; border: 3px solid #333; margin: 0 auto; position: relative; background: #151515; border-radius: 10px; touch-action: manipulation; }
        #target { position: absolute; cursor: pointer; border-radius: 50%; transition: all 0.05s; display: flex; align-items: center; justify-content: center; font-size: 10px; }
        
        /* رسالة النهاية */
        #result-screen { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.95); padding: 30px; border-radius: 20px; border: 3px solid #FFD700; width: 80%; max-width: 400px; z-index: 100; }
        .win-msg { color: #00FF00; font-size: 24px; font-weight: bold; }


/* تأثير التوهج الذهبي للأزرار */
#result-screen button {
    border: 2px solid #FFD700;
    box-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
    position: relative;
    overflow: hidden;
    transition: all 0.3s ease;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
}

/* حركة التوهج النابض */
@keyframes gold-glow {
    0% { box-shadow: 0 0 5px #FFD700; }
    50% { box-shadow: 0 0 20px #FFD700, 0 0 30px #ffcc00; }
    100% { box-shadow: 0 0 5px #FFD700; }
}

/* تطبيق الحركة على زر ال والنسخ بشكل خاص */
#share-btn, #copy-btn {
    animation: gold-glow 2s infinite ease-in-out;
}

/* تأثير التمرير (Hover) */
#result-screen button:hover {
    transform: scale(1.03);
    box-shadow: 0 0 25px #FFD700 !important;
    filter: brightness(1.2);
}

/* إضافة لمعة بريق تمر من فوق الزر كل فترة */
#result-screen button::after {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
    transform: rotate(45deg);
    transition: 0.5s;
    pointer-events: none;
}

#result-screen button:hover::after {
    left: 100%;
    top: 100%;
}


<!-- أزرار التواصل الاجتماعي -->
/* تأثير النبض المستمر */
@keyframes pulse-animation {
    0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 215, 0, 0.4); }
    70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(255, 215, 0, 0); }
    100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 215, 0, 0); }
}

.social-links {
    display: flex;
    justify-content: center; /* التوسيط الأفقي */
    align-items: center;
    gap: 20px;
    margin: 15px auto;
    width: fit-content; /* تأخذ مساحة محتواها فقط لسهولة التوسيط */
}

.social-links a {
    background: #1a1a1a;
    width: 45px;
    height: 45px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
    border: 1px solid #FFD700;
    transition: 0.3s;
    /* تطبيق التنبض على كل أيقونة */
    animation: pulse-animation 2s infinite;
}

/* جعل النبض يبدأ بتوقيت مختلف لكل أيقونة ليعطي مظهراً أجمل */
.social-links a:nth-child(2) {
    animation-delay: 1s;
}

.social-links svg {
    width: 22px;
    fill: #FFD700;
}

/* تأثير عند تمرير الماوس */
.social-links a:hover {
    background: #FFD700;
    animation: none; /* إيقاف النبض عند التفاعل المباشر */
    transform: translateY(-5px); /* حركة بسيطة للأعلى */
}

.social-links a:hover svg {
    fill: black;
}

/*AHMED /*
 /* تطبيق نفس حركة التوهج الذهبي التي للأزرار */
    animation: gold-glow 2s infinite ease-in-out;
}

.social-links a:hover {
    transform: scale(1.1) translateY(-5px); /* تكبير بسيط وحركة للأعلى */
    box-shadow: 0 0 25px #FFD700 !important;
    background: #222;
}
/* تشغيل اللمعة عند تمرير الماوس */
.social-links a:hover::after {
    left: 100%;
    top: 100%;
}
<!-- أزرار التواصل الاجتماعي -->
    </style>

    // استخدام الـ Clipboard API للنسخ
    navigator.clipboard.writeText(gameLink).then(() => {
        // تغيير نص الزر مؤقتاً لتنبيه اللاعب
        const originalText = btn.innerHTML;
        btn.innerHTML = "تم النسخ! ✅";
        btn.style.background = "#28a745"; // تغيير اللون للأخضر مؤقتاً
        
        setTimeout(() => {
            btn.innerHTML = originalText;
            btn.style.background = "#007bff";
        }, 2000);
    }).catch(err => {
        console.error('فشل النسخ: ', err);
    });
}
// 1. منع القائمة المنسدلة (كليك يمين)
document.addEventListener('contextmenu', event => event.preventDefault());

// 2. منع اختصارات لوحة المفاتيح الخاصة بالمطورين
document.addEventListener('keydown', (event) => {
    if (
        event.key === 'F12' || // منع F12
        (event.ctrlKey && event.shiftKey && (event.key === 'I' || event.key === 'J' || event.key === 'C')) || // منع Ctrl+Shift+I/J/C
        (event.ctrlKey && event.key === 'U') // منع Ctrl+U (عرض المصدر)
    ) {
        event.preventDefault();
        return false;
    }
});

    </script>
